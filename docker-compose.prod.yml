services:
  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN:-demo.kellywebsite.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 300 --access-logfile - --error-logfile -
    env_file:
      - ${APP_ENV_FILE:-.env}
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A config worker -l info
    env_file:
      - ${APP_ENV_FILE:-.env}
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-demo.kellywebsite.com,www.demo.kellywebsite.com}
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
  media_data:
