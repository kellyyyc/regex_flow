services:
  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A config worker -l info
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://demo.kellywebsite.com:8000/api}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-localhost,127.0.0.1,demo.kellywebsite.com,www.demo.kellywebsite.com}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "80:5173"
    depends_on:
      - backend

volumes:
  media_data:
